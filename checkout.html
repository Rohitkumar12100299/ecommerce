<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase - Checkout</title>

<!-- ================= GTM DATA LAYER ================= -->
<script>
window.dataLayer = window.dataLayer || [];
</script>

<!-- ================= PAGE LEVEL DATA ================= -->
<script>
(function () {
const userId = localStorage.getItem("loggedInUser");
dataLayer.push({
page_Name: "ShopEase:Checkout",
page_Type: "checkout",
site_Name: "ShopEase",
language: "en-US",
user_Id: userId ? userId : null,
user_Type: userId ? "registered" : "guest"
});
})();
</script>

<!-- Google Tag Manager -->
<script>(function(w,d,s,l,i){w[l]=w[l]||[];
w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});
var f=d.getElementsByTagName(s)[0],j=d.createElement(s),
dl=l!='dataLayer'?'&l='+l:'';
j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id=GTM-574TC2N4'+dl;
f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-574TC2N4');</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
header { background: #333; color: white; padding: 1rem; display: flex; justify-content: space-between; }
nav ul { display: flex; list-style: none; }
nav ul li { margin-left: 1rem; }
nav a { color: white; text-decoration: none; }
.checkout-container { display: flex; padding: 2rem; gap: 2rem; }
.shipping-form { flex: 2; }
.order-summary { flex: 1; background: #f0f0f0; padding: 1rem; }
.cart-item { display: flex; justify-content: space-between; margin-bottom: 1rem; }
.form-group { margin-bottom: 1rem; }
label { display: block; margin-bottom: 0.5rem; }
input, select { width: 100%; padding: 0.5rem; }
.checkout-btn { background: #4CAF50; color: white; border: none; padding: 1rem; width: 100%; cursor: pointer; }
footer { background: #333; color: white; text-align: center; padding: 1rem; margin-top: 2rem; }
</style>
</head>

<body>

<header>
<h1>ShopEase</h1>
<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="products.html">Shop</a></li>
<li><a href="checkout.html">Cart (0)</a></li>
</ul>
</nav>
</header>

<div class="checkout-container">

<section class="shipping-form">
<h2>Shipping Information</h2>

<form id="checkoutForm">

<div class="form-group">
<label for="name">Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label for="address">Address</label>
<input type="text" id="address" required>
</div>

<div class="form-group">
<label for="city">City</label>
<input type="text" id="city" required>
</div>

<div class="form-group">
<label for="zip">ZIP Code</label>
<input type="text" id="zip" required>
</div>

<div class="form-group">
<label for="country">Country</label>
<select id="country" required>
<option value="">Select Country</option>
<option value="US">United States</option>
<option value="CA">Canada</option>
<option value="UK">United Kingdom</option>
</select>
</div>

<h3>Payment Information</h3>

<div class="form-group">
<label for="card">Card Number</label>
<input type="text" id="card" required>
</div>

<div class="form-group">
<label for="expiry">Expiry Date</label>
<input type="text" id="expiry" placeholder="MM/YY" required>
</div>

<div class="form-group">
<label for="cvv">CVV</label>
<input type="text" id="cvv" required>
</div>

<button type="submit" class="checkout-btn">Complete Purchase</button>

</form>
</section>

<section class="order-summary">
<h2>Order Summary</h2>

<div id="cartItems"></div>

<hr>

<div class="cart-totals">
<p>Subtotal: <span id="subtotal">$0.00</span></p>
<p>Shipping: <span id="shipping">$5.99</span></p>
<p>Tax: <span id="tax">$0.00</span></p>
<h3>Total: <span id="total">$0.00</span></h3>
</div>

</section>

</div>

<footer>
<p>© 2023 ShopEase. All rights reserved.</p>
</footer>

<script>

function loadCart(){

const cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartItemsContainer = document.getElementById('cartItems');

let subtotal = 0;

if(cart.length === 0){
cartItemsContainer.innerHTML = '<p>Your cart is empty</p>';
return;
}

cartItemsContainer.innerHTML='';

cart.forEach((item,index)=>{
const itemTotal=item.price * item.quantity;
subtotal+=itemTotal;

const itemElement=document.createElement('div');
itemElement.className='cart-item';

itemElement.innerHTML=`
<div>
<h4>${item.name}</h4>
<p>${item.quantity} x $${item.price.toFixed(2)}</p>
</div>
<p>$${itemTotal.toFixed(2)}</p>
`;

cartItemsContainer.appendChild(itemElement);
});

const shipping=5.99;
const tax=subtotal*0.08;
const total=subtotal+shipping+tax;

document.getElementById('subtotal').textContent=`$${subtotal.toFixed(2)}`;
document.getElementById('tax').textContent=`$${tax.toFixed(2)}`;
document.getElementById('total').textContent=`$${total.toFixed(2)}`;


// ✅ VIEW CART (FULL FORMAT)
dataLayer.push({ ecommerce: null });
dataLayer.push({
event: "view_cart",
ecommerce: {
currency: "USD",
value: subtotal,
items: cart.map((item,index)=>({
item_id: "SKU_" + item.id,
item_name: item.name,
affiliation: "ShopEase",
coupon: null,
discount: 0,
index: index,
item_brand: "ShopEase",
item_category: "general",
item_category2: null,
item_category3: null,
item_category4: null,
item_category5: null,
item_list_id: "related_products",
item_list_name: "Related Products",
item_variant: null,
location_id: null,
price: item.price,
google_business_vertical: "retail",
quantity: item.quantity
}))
}
});

}

document.getElementById('checkoutForm').addEventListener('submit',function(e){

e.preventDefault();

const cart=JSON.parse(localStorage.getItem('cart')) || [];

if(cart.length===0){
alert('Your cart is empty!');
return;
}

const subtotal = cart.reduce((sum,item)=>sum+(item.price*item.quantity),0);
const tax = subtotal * 0.08;
const shipping = 5.99;
const total = subtotal + tax + shipping;

// ✅ ADD PAYMENT INFO (FULL FORMAT)
dataLayer.push({ ecommerce: null });
dataLayer.push({
event: "add_payment_info",
ecommerce: {
currency: "USD",
value: total,
coupon: "SUMMER_FUN",
payment_type: "Credit Card",
items: cart.map((item,index)=>({
item_id: "SKU_" + item.id,
item_name: item.name,
affiliation: "ShopEase",
coupon: "SUMMER_FUN",
discount: 0,
index: index,
item_brand: "ShopEase",
item_category: "general",
item_category2: null,
item_category3: null,
item_category4: null,
item_category5: null,
item_list_id: "related_products",
item_list_name: "Related Products",
item_variant: null,
location_id: null,
price: item.price,
google_business_vertical: "retail",
quantity: item.quantity
}))
}
});

// ✅ PURCHASE (ONLY ON CLICK)
dataLayer.push({ ecommerce: null });
dataLayer.push({
event: "purchase",
ecommerce: {
transaction_id: "T_" + Date.now(),
value: total,
tax: tax,
shipping: shipping,
currency: "USD",
coupon: "SUMMER_SALE",
customer_type: "new",
items: cart.map((item,index)=>({
item_id: "SKU_" + item.id,
item_name: item.name,
affiliation: "ShopEase",
coupon: "SUMMER_FUN",
discount: 0,
index: index,
item_brand: "ShopEase",
item_category: "general",
item_category2: null,
item_category3: null,
item_category4: null,
item_category5: null,
item_list_id: "related_products",
item_list_name: "Related Products",
item_variant: null,
location_id: null,
price: item.price,
quantity: item.quantity
}))
}
});

alert('Order placed successfully!');

localStorage.removeItem('cart');
localStorage.setItem('cartCount',0);

document.querySelector('nav ul li:last-child a').textContent='Cart (0)';

window.location.href='index.html';

});

loadCart();

let cartCount=localStorage.getItem('cartCount') || 0;
document.querySelector('nav ul li:last-child a').textContent=`Cart (${cartCount})`;

</script>

</body>
</html>
