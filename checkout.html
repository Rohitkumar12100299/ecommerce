</div>

<script>

function loadCart(){

const cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartItemsContainer = document.getElementById('cartItems');

let subtotal = 0;

if(cart.length === 0){

cartItemsContainer.innerHTML = '<p>Your cart is empty</p>';

document.getElementById('subtotal').textContent='$0.00';
document.getElementById('tax').textContent='$0.00';
document.getElementById('total').textContent='$0.00';

return;

}

cartItemsContainer.innerHTML='';

cart.forEach(item=>{

const itemTotal=item.price * item.quantity;

subtotal+=itemTotal;

const itemElement=document.createElement('div');

itemElement.className='cart-item';

itemElement.innerHTML=`
<div>
<h4>${item.name}</h4>
<p>${item.quantity} x $${item.price.toFixed(2)}</p>
</div>
<p>$${itemTotal.toFixed(2)}</p>
`;

cartItemsContainer.appendChild(itemElement);

});

const shipping=5.99;
const tax=subtotal*0.08;
const total=subtotal+shipping+tax;

document.getElementById('subtotal').textContent=`$${subtotal.toFixed(2)}`;
document.getElementById('tax').textContent=`$${tax.toFixed(2)}`;
document.getElementById('total').textContent=`$${total.toFixed(2)}`;

dataLayer.push({
event:"view_cart",
cart_items:cart.length,
cart_value:subtotal
});

}

document.getElementById('checkoutForm').addEventListener('submit',function(e){

e.preventDefault();

const cart=JSON.parse(localStorage.getItem('cart')) || [];

if(cart.length===0){

alert('Your cart is empty!');
return;

}

const orderValue=cart.reduce((sum,item)=>sum+(item.price*item.quantity),0);

dataLayer.push({
event:"checkout_click",
cart_items:cart.length,
cart_value:orderValue
});

dataLayer.push({
event:"purchase",
order_value:orderValue,
items:cart
});

alert('Order placed successfully! Thank you for your purchase.');

localStorage.removeItem('cart');
localStorage.setItem('cartCount',0);

document.querySelector('nav ul li:last-child a').textContent='Cart (0)';

window.location.href='index.html';

});

loadCart();

let cartCount=localStorage.getItem('cartCount') || 0;

document.querySelector('nav ul li:last-child a').textContent=`Cart (${cartCount})`;

</script>
