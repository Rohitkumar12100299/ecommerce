<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase - Checkout</title>

<script>
window.dataLayer = window.dataLayer || [];
</script>

<script>
(function () {
const userId = localStorage.getItem("loggedInUser");
dataLayer.push({
page_Name: "Checkout",
page_Type: "checkout",
site_Name: "ShopEase",
language: "en-US",
user_Id: userId ? userId : null,
user_Type: userId ? "registered" : "guest"
});
})();
</script>

<script>(function(w,d,s,l,i){w[l]=w[l]||[];
w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});
var f=d.getElementsByTagName(s)[0],j=d.createElement(s),
dl=l!='dataLayer'?'&l='+l:'';
j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id=GTM-574TC2N4'+dl;
f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-574TC2N4');</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
header{background:#333;color:#fff;padding:1rem;display:flex;justify-content:space-between}
nav ul{display:flex;list-style:none}
nav li{margin-left:1rem}
nav a{color:#fff;text-decoration:none}
.checkout-container{display:flex;padding:2rem;gap:2rem}
.shipping-form{flex:2}
.order-summary{flex:1;background:#f0f0f0;padding:1rem}
.cart-item{display:flex;justify-content:space-between;margin-bottom:1rem}
input,select{width:100%;padding:0.5rem;margin-bottom:1rem}
.checkout-btn{background:#4CAF50;color:#fff;border:none;padding:1rem;width:100%;cursor:pointer}
footer{background:#333;color:#fff;text-align:center;padding:1rem;margin-top:2rem}
</style>
</head>

<body>

<header>
<h1>ShopEase</h1>
<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="products.html">Shop</a></li>
<li><a href="checkout.html">Cart (0)</a></li>
</ul>
</nav>
</header>

<div class="checkout-container">

<section class="shipping-form">
<h2>Shipping Information</h2>
<form id="checkoutForm">
<input type="text" placeholder="Name" required>
<input type="email" placeholder="Email" required>
<input type="text" placeholder="Address" required>
<input type="text" placeholder="City" required>
<input type="text" placeholder="ZIP" required>
<select required><option>Country</option></select>
<button class="checkout-btn">Complete Purchase</button>
</form>
</section>

<section class="order-summary">
<h2>Order Summary</h2>
<div id="cartItems"></div>
<p>Subtotal: <span id="subtotal">$0.00</span></p>
<p>Tax: <span id="tax">$0.00</span></p>
<h3>Total: <span id="total">$0.00</span></h3>
</section>

</div>

<footer><p>© 2023 ShopEase</p></footer>

<script>
function loadCart(){
const cart = JSON.parse(localStorage.getItem('cart')) || [];
let subtotal = 0;
const container = document.getElementById('cartItems');

if(cart.length===0){
container.innerHTML='<p>Your cart is empty</p>';
return;
}

container.innerHTML='';

cart.forEach((item,index)=>{
let total=item.price*item.quantity;
subtotal+=total;

let div=document.createElement('div');
div.className='cart-item';
div.innerHTML=`<div>${item.name} (${item.quantity})</div><div>$${total.toFixed(2)}</div>`;
container.appendChild(div);
});

let tax=subtotal*0.08;
let total=subtotal+tax;

document.getElementById('subtotal').textContent=`$${subtotal.toFixed(2)}`;
document.getElementById('tax').textContent=`$${tax.toFixed(2)}`;
document.getElementById('total').textContent=`$${total.toFixed(2)}`;

// view_cart
dataLayer.push({ ecommerce:null });
dataLayer.push({
event:"view_cart",
ecommerce:{
currency:"USD",
value:subtotal,
items:cart.map((item,index)=>({
item_id:"SKU_"+item.id,
item_name:item.name,
index:index,
price:item.price,
quantity:item.quantity
}))
}
});
}

document.getElementById('checkoutForm').addEventListener('submit',function(e){
e.preventDefault();

const cart=JSON.parse(localStorage.getItem('cart'))||[];
if(cart.length===0){alert('Cart empty');return;}

let subtotal=cart.reduce((s,i)=>s+i.price*i.quantity,0);
let tax=subtotal*0.08;
let shipping=5.99;
let total=subtotal+tax+shipping;

// add_payment_info
dataLayer.push({ ecommerce:null });
dataLayer.push({
event:"add_payment_info",
ecommerce:{
currency:"USD",
value:total,
payment_type:"Credit Card",
items:cart.map((item,index)=>({
item_id:"SKU_"+item.id,
item_name:item.name,
index:index,
price:item.price,
quantity:item.quantity
}))
}
});

// purchase
dataLayer.push({ ecommerce:null });
dataLayer.push({
event:"purchase",
ecommerce:{
transaction_id:"T_"+Date.now(),
value:total,
tax:tax,
shipping:shipping,
currency:"USD",
items:cart.map((item,index)=>({
item_id:"SKU_"+item.id,
item_name:item.name,
index:index,
price:item.price,
quantity:item.quantity
}))
}
});

alert('Order placed');

localStorage.removeItem('cart');
localStorage.setItem('cartCount',0);

window.location.href='index.html';
});

loadCart();

let count=localStorage.getItem('cartCount')||0;
document.querySelector('nav ul li:last-child a').textContent=`Cart (${count})`;
</script>

</body>
</html>
